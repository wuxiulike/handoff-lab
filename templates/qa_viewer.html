<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handoff Lab QA Viewer</title>
<style>
:root{
  --bg:#0a0d10;
  --panel:#121820;
  --panel-2:#171f2a;
  --line:#2b3644;
  --muted:#8996a8;
  --text:#e3e9f2;
  --blue:#5aa7ff;
  --green:#42d392;
  --gold:#e8b95b;
  --red:#ff6b6b;
  --cyan:#35d4c7;
}
*{box-sizing:border-box}
html,body{min-height:100%;overflow:auto}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Segoe UI",sans-serif}
.shell{height:100vh;display:grid;grid-template-columns:280px 1fr}
.rail{background:#0f141b;border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;min-width:0}
.brand{font-size:18px;font-weight:800;letter-spacing:.2px;margin-bottom:4px;color:#f0f6ff}
.subtitle{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:18px}
.control-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}
.label{font-size:12px;color:var(--muted);margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center}
input,button{font:inherit}
input{width:64px;background:#0b1016;border:1px solid var(--line);border-radius:6px;color:var(--text);padding:8px}
button{background:#1d2632;border:1px solid var(--line);border-radius:7px;color:var(--text);padding:8px 10px;cursor:pointer;font-weight:700}
button:hover{border-color:var(--blue);color:#fff}
.primary{background:#1d5ea8;border-color:#2f81f7}
.danger{background:#412026;border-color:#79323a}
.stat{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat:last-child{border-bottom:0}
.stat b{color:var(--text);font-weight:700}
.dot{width:9px;height:9px;border-radius:999px;background:var(--red);display:inline-block;margin-right:6px}
.dot.on{background:var(--green);box-shadow:0 0 12px rgba(66,211,146,.45)}
.legend{margin-top:auto;font-size:12px;color:var(--muted);line-height:1.8}
.legend span{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:7px}
.main{min-width:0;display:grid;grid-template-rows:auto 1fr;background:linear-gradient(180deg,#0c1117,#090c10)}
.topbar{height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(18,24,32,.86)}
.title{font-weight:800;color:#f0f6ff}
.hint{font-size:12px;color:var(--muted);margin-top:2px}
.timeline{overflow:auto;padding:22px 28px 80px}
.empty{height:70vh;display:grid;place-items:center;color:var(--muted);text-align:center}
.empty strong{display:block;color:var(--text);font-size:18px;margin-bottom:8px}
.event{background:var(--panel);border:1px solid var(--line);border-left:3px solid #6e7681;border-radius:6px;margin:0 0 8px;padding:10px 14px;font-size:13px;animation:fadeIn .18s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.event-head{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;color:var(--text)}
.event-head:hover{color:#fff}
.icon{font-size:14px;width:18px;text-align:center;flex:0 0 18px}
.event-title{font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-label{font-size:11px;color:var(--muted);font-family:Consolas,monospace;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.time{font-size:11px;color:#6e7681;font-family:Consolas,monospace}
.event-detail{margin-top:8px;padding:8px 10px;background:#0b1016;border-radius:4px;font-family:"Cascadia Code",Consolas,monospace;font-size:12px;white-space:pre-wrap;word-break:break-word;color:#a8b3c5;line-height:1.55;max-height:260px;overflow:auto;border:1px solid rgba(255,255,255,.05)}
.collapsed .event-detail{display:none}
.event.codex,.event.thinking{border-left-color:var(--blue)}
.event.codex .icon,.event.thinking .icon{color:var(--blue)}
.event.reasonix,.event.tool_result{border-left-color:var(--cyan)}
.event.reasonix .icon,.event.tool_result .icon{color:var(--cyan)}
.event.tool_call{border-left-color:#bc8cff}
.event.tool_call .icon{color:#bc8cff}
.event.review,.event.tokens{border-left-color:#d2a8ff}
.event.review .icon,.event.tokens .icon{color:#d2a8ff}
.event.round,.event.round_start{border-left-color:var(--gold);background:#211c0f}
.event.round .icon,.event.round_start .icon{color:var(--gold)}
.event.approved,.event.done{border-left-color:var(--green);background:#0d2818}
.event.approved .icon,.event.done .icon{color:var(--green)}
.event.error,.event.warn{border-left-color:var(--red);background:#2a1116}
.event.error .icon,.event.warn .icon{color:var(--red)}
.toolbar{display:flex;gap:8px;align-items:center}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
@media(max-width:900px){
  body{overflow:auto}
  .shell{height:auto;min-height:100vh;grid-template-columns:1fr}
  .rail{border-right:0;border-bottom:1px solid var(--line)}
  .main{min-height:70vh}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="rail">
    <div class="brand">Handoff Lab</div>
    <div class="subtitle">独立过程查看器，只观察通过 Codex 调用 Reasonix 的规划、施工、自检和验收。</div>

    <div class="control-card">
      <div class="label">三轮开发演练</div>
      <div class="row">
        <input id="rounds" type="number" min="1" max="3" value="3" title="最多 3 轮">
        <button class="primary" onclick="startRehearsal()">启动</button>
        <button class="danger" onclick="stopRun()">停止</button>
      </div>
    </div>

    <div class="control-card">
      <div class="label">监控 Reasonix 工作目录</div>
      <input id="watchWorkspace" style="width:100%;margin-bottom:8px" value="{{ watch_workspace }}" title="正在施工的项目目录">
      <div class="row">
        <button class="primary" onclick="startWatch()">监控</button>
        <button onclick="stopWatch()">停监控</button>
      </div>
    </div>

    <div class="control-card">
      <div class="stat"><span>连接</span><b><span id="dot" class="dot"></span><span id="conn">连接中</span></b></div>
      <div class="stat"><span>事件</span><b id="eventCount">0</b></div>
      <div class="stat"><span>轮次</span><b id="roundStat">-</b></div>
      <div class="stat"><span>状态</span><b id="statusStat">等待</b></div>
    </div>

    <div class="control-card">
      <div class="row">
        <button id="autoBtn" onclick="toggleAuto()">自动滚动</button>
        <button onclick="toggleAll()">展开/收起</button>
        <button onclick="clearTimeline()">清空</button>
      </div>
    </div>

    <div class="legend">
      <div><span style="background:var(--blue)"></span>Codex 任务包 / 规划 / QA</div>
      <div><span style="background:var(--cyan)"></span>Reasonix 施工 / 自检摘要</div>
      <div><span style="background:var(--gold)"></span>轮次 / 验收</div>
      <div><span style="background:var(--red)"></span>错误 / 停止</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="title">过程时间线</div>
        <div class="hint">复用当前服务的 SSE：<code>/stream</code>。打开 <code>/</code> 会自动进入本查看器。</div>
      </div>
      <div class="toolbar">
        <button onclick="location.reload()">刷新</button>
      </div>
    </header>
    <section id="timeline" class="timeline">
      <div id="empty" class="empty">
        <div>
          <strong>等待事件</strong>
          <div>点击左侧“启动”，或通过 Handoff Lab skill 发起开发任务，这里会实时显示过程。</div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const timeline = document.getElementById("timeline");
const empty = document.getElementById("empty");
const KIND_ICON = {
  codex: "C",
  reasonix: "R",
  system: "i",
  review: "Q",
  approved: "✓",
  error: "!",
  warn: "!",
  round: "#",
  round_start: "#",
  thinking: "C",
  tool_call: ">",
  tool_result: "<",
  tokens: "T",
  done: "✓",
};
let currentTokenCard = null;
let currentTokenKey = "";
let eventCount = 0;
let autoScroll = true;
let expanded = false;

function nowTime(){
  return new Date().toLocaleTimeString("zh-CN",{hour12:false});
}

function esc(s){
  const d = document.createElement("div");
  d.textContent = s == null ? "" : String(s);
  return d.innerHTML;
}

function classify(model, role, eventType){
  const text = `${model || ""} ${role || ""} ${eventType || ""}`;
  if (/error|错误|stopped|停止/i.test(text)) return "error";
  if (/review|验收/i.test(text)) return "review";
  if (/approved|通过/i.test(text)) return "approved";
  if (/round/i.test(text)) return "round";
  if (/reasonix_output|输出/i.test(text)) return "reasonix";
  if (/workspace_snapshot|工作目录变化/i.test(text)) return "tool_result";
  if (/reasonix|deepseek/i.test(text)) return "reasonix";
  if (/codex|chatgpt|任务包|规划/i.test(text)) return "codex";
  return "system";
}

function ensureEventBase(){
  if (empty) empty.remove();
  eventCount += 1;
  document.getElementById("eventCount").textContent = eventCount;
}

function formatDetail(detail){
  if (detail == null) return "";
  if (typeof detail !== "string") return JSON.stringify(detail, null, 2);
  const trimmed = detail.trim();
  if (!trimmed) return "";
  if ((trimmed.startsWith("{") && trimmed.endsWith("}")) || (trimmed.startsWith("[") && trimmed.endsWith("]"))) {
    try { return JSON.stringify(JSON.parse(trimmed), null, 2); } catch(err) {}
  }
  return detail
    .replace(/\r\n/g, "\n")
    .replace(/\n(git status --short:)/g, "\n\n$1")
    .replace(/\n(recent Reasonix\/Codex evidence files:)/g, "\n\n$1");
}

function addCard({kind="system", label="System", title="", detail="", collapsed=true}){
  ensureEventBase();
  const div = document.createElement("article");
  div.className = `event ${kind}${collapsed && !expanded ? " collapsed" : ""}`;
  const formattedDetail = formatDetail(detail);
  div.innerHTML = `<div class="event-head">
    <span class="icon">${esc(KIND_ICON[kind] || "•")}</span>
    <span class="event-title">${esc(title || label)}</span>
    <span class="event-label">${esc(label || kind)}</span>
    <span class="time">${nowTime()}</span>
  </div>`;
  if (formattedDetail) {
    const detailEl = document.createElement("div");
    detailEl.className = "event-detail";
    detailEl.textContent = formattedDetail;
    div.appendChild(detailEl);
  }
  div.querySelector(".event-head").onclick = () => div.classList.toggle("collapsed");
  timeline.appendChild(div);
  if (autoScroll) div.scrollIntoView({block:"end"});
  return div;
}

function removeDuplicateWorkspaceSnapshots(){
  const cards = Array.from(document.querySelectorAll(".event[data-kind='workspace_snapshot']"));
  const keep = 3;
  cards.slice(0, Math.max(0, cards.length - keep)).forEach(card => card.remove());
  const removed = Math.max(0, cards.length - keep);
  if (removed) {
    eventCount = Math.max(0, eventCount - removed);
    document.getElementById("eventCount").textContent = eventCount;
  }
}

function addToken(model, role, text){
  const key = `${model}:${role}`;
  if (!currentTokenCard || currentTokenKey !== key) {
    currentTokenKey = key;
    currentTokenCard = addCard({
      kind: classify(model, role, "token"),
      label: model || "Token",
      title: `${role || "输出"} · ${model || "System"}`,
      detail: "",
      collapsed: false
    });
  }
  let body = currentTokenCard.querySelector(".event-detail");
  if (!body) {
    body = document.createElement("div");
    body.className = "event-detail";
    currentTokenCard.appendChild(body);
  }
  body.textContent += text || "";
  if (autoScroll) currentTokenCard.scrollIntoView({block:"end"});
}

function finalizeToken(){
  currentTokenCard = null;
  currentTokenKey = "";
}

function handleEvent(eventType, data){
  if (eventType !== "token") finalizeToken();
  if (eventType === "token") {
    addToken(data.model, data.role, data.text || "");
    return;
  }
  if (eventType === "round_start") {
    document.getElementById("roundStat").textContent = `${data.round}/${data.max_round}`;
    document.getElementById("statusStat").textContent = "运行中";
    addCard({kind:"round",label:"Round",title:`Round ${data.round}/${data.max_round}`,detail:JSON.stringify(data,null,2),collapsed:false});
    return;
  }
  if (eventType === "step_done") {
    const kind = data.step === "pipeline_complete" ? "approved" : classify(data.actor, data.summary, eventType);
    document.getElementById("statusStat").textContent = data.summary || data.step || "完成";
    addCard({kind,label:data.actor || "Step",title:data.summary || data.step,detail:JSON.stringify(data,null,2)});
    return;
  }
  if (eventType === "review") {
    document.getElementById("statusStat").textContent = data.status || "验收";
    addCard({kind: data.status === "APPROVED" ? "approved" : "review",label:"Review",title:`${data.status || "UNKNOWN"} · ${data.summary || ""}`,detail:JSON.stringify(data,null,2),collapsed:false});
    return;
  }
  if (eventType === "agent_event") {
    addCard({kind:classify(data.actor, data.kind, eventType),label:data.actor || "Agent",title:data.message || data.kind,detail:JSON.stringify(data,null,2)});
    return;
  }
  if (eventType === "status") {
    addCard({kind:"system",label:"Status",title:data.text || "状态",detail:JSON.stringify(data,null,2)});
    return;
  }
  if (eventType === "stopped") {
    document.getElementById("statusStat").textContent = "已停止";
    addCard({kind:"error",label:"Stop",title:data.reason || "已停止",detail:JSON.stringify(data,null,2),collapsed:false});
    return;
  }
  if (eventType === "qa_external") {
    const title = data.title || data.kind || "跨对话事件";
    const label = data.label || "External";
    const detail = data.detail || JSON.stringify(data,null,2);
    const isSnapshot = data.kind === "workspace_snapshot";
    const isReasonixOutput = data.kind === "reasonix_output";
    const card = addCard({kind:classify(label, title, data.kind),label,title,detail,collapsed: isSnapshot ? true : !isReasonixOutput});
    card.dataset.kind = data.kind || "";
    if (isSnapshot) removeDuplicateWorkspaceSnapshots();
    if (data.kind) document.getElementById("statusStat").textContent = data.kind;
    return;
  }
  if (eventType === "file_update") {
    addCard({kind:"system",label:"Files",title:"工作目录变更",detail:JSON.stringify(data.tree ? {root:data.tree.name,path:data.path || ""} : data,null,2)});
    return;
  }
  if (eventType === "context") return;
  addCard({kind:"system",label:eventType,title:eventType,detail:JSON.stringify(data,null,2)});
}

function connect(){
  const es = new EventSource("/stream");
  es.onopen = () => {
    document.getElementById("dot").classList.add("on");
    document.getElementById("conn").textContent = "已连接";
  };
  const events = ["connected","round_start","token","status","agent_event","step_done","review","qa_external","file_update","context","stopped"];
  events.forEach(name => es.addEventListener(name, e => {
    try { handleEvent(name, e.data ? JSON.parse(e.data) : {}); } catch(err) {}
  }));
  es.onerror = () => {
    document.getElementById("dot").classList.remove("on");
    document.getElementById("conn").textContent = "重连中";
  };
}

function loadRecentQaEvents(){
  fetch("/api/qa-events")
    .then(r => r.json())
    .then(data => {
      (data.events || []).forEach(event => handleEvent("qa_external", event));
    })
    .catch(() => {});
}

function loadWatchState(){
  fetch("/api/qa-watch")
    .then(r => r.json())
    .then(data => {
      if (data.workspace) {
        document.getElementById("watchWorkspace").value = data.workspace;
        document.getElementById("statusStat").textContent = data.running ? "监控中" : "已停止";
        return;
      }
      return fetch("/api/workspace")
        .then(r => r.json())
        .then(workspaceData => {
          if (workspaceData.path) document.getElementById("watchWorkspace").value = workspaceData.path;
        });
    })
    .catch(() => {});
}

function startRehearsal(){
  const rounds = Math.min(3, Math.max(1, parseInt(document.getElementById("rounds").value || "3", 10)));
  document.getElementById("statusStat").textContent = "启动中";
  fetch("/api/dev-rehearsal", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({rounds})
  }).then(r => r.json().then(data => ({ok:r.ok,status:r.status,data})))
    .then(({ok,status,data}) => {
      if (!ok) throw new Error(data.message || data.error || `HTTP ${status}`);
      addCard({kind:"system",label:"Start",title:`开发演练已启动：${data.rounds} 轮`,detail:JSON.stringify(data,null,2),collapsed:false});
    })
    .catch(err => {
      document.getElementById("statusStat").textContent = "启动失败";
      addCard({kind:"error",label:"Error",title:"开发演练启动失败",detail:err.message,collapsed:false});
    });
}

function stopRun(){
  fetch("/api/stop",{method:"POST"});
}

function startWatch(){
  const workspace = document.getElementById("watchWorkspace").value.trim();
  if (!workspace) {
    addCard({kind:"error",label:"Watch",title:"监控启动失败",detail:"请先填写工作目录，例如 H:/py/ppt/ppt_GLM",collapsed:false});
    return;
  }
  fetch("/api/qa-watch", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({workspace, interval:3})
  }).then(r => r.json().then(data => ({ok:r.ok,status:r.status,data})))
    .then(({ok,status,data}) => {
      if (!ok) throw new Error(data.error || `HTTP ${status}`);
      addCard({kind:"system",label:"Watch",title:"开始监控工作目录",detail:JSON.stringify(data,null,2),collapsed:false});
    })
    .catch(err => addCard({kind:"error",label:"Watch",title:"监控启动失败",detail:err.message,collapsed:false}));
}

function stopWatch(){
  fetch("/api/qa-watch", {method:"DELETE"})
    .then(r => r.json())
    .then(data => addCard({kind:"system",label:"Watch",title:"已停止工作目录监控",detail:JSON.stringify(data,null,2)}))
    .catch(err => addCard({kind:"error",label:"Watch",title:"停止监控失败",detail:err.message}));
}

function toggleAuto(){
  autoScroll = !autoScroll;
  document.getElementById("autoBtn").style.borderColor = autoScroll ? "var(--blue)" : "var(--line)";
}

function toggleAll(){
  expanded = !expanded;
  document.querySelectorAll(".event").forEach(card => card.classList.toggle("collapsed", !expanded));
}

function clearTimeline(){
  document.querySelectorAll(".event").forEach(card => card.remove());
  eventCount = 0;
  document.getElementById("eventCount").textContent = "0";
  document.getElementById("roundStat").textContent = "-";
  document.getElementById("statusStat").textContent = "等待";
  timeline.appendChild(empty);
  fetch("/api/qa-events", {method:"DELETE"}).catch(() => {});
}

loadWatchState();
loadRecentQaEvents();
connect();
</script>
</body>
</html>
